; Laravel queue worker — copy to /etc/supervisor/conf.d/ and adjust paths.
;
;   sudo cp deploy/supervisor/salon-mvp-queue.conf /etc/supervisor/conf.d/
;   sudo supervisorctl reread && sudo supervisorctl update
;   sudo supervisorctl status salon-mvp-queue:*

[program:salon-mvp-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/salon_mvp_api/artisan queue:work redis --sleep=3 --tries=3 --timeout=90 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/salon_mvp_api/storage/logs/queue-worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stopwaitsecs=3600
